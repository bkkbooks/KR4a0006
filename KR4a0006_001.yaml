  text: 欽定四庫全書欽定補繪蕭雲從離騷全圖卷上
  hash: sha256:25143a4370afdae2f52c0b3ada40f4c1822836fefe3d3eb6e19522a035d057c3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4a0006_WYG_001-1a, image: WYG1062/WYG1062-0500a.png}
body:
  text: 離騷經離騷經者屈原之所作也屈原名平與楚同姓仕於懷王為三閭大夫三閭之職掌王族三姓曰昭屈景屈原序其譜屬率其賢良以厲國士入則與王圖議政事决定嫌疑出則監察羣下應對諸侯謀行職修王甚珍之同列大夫上官靳尚妬害其能共譖毁之王乃疏屈原屈原執履忠貞而被讒邪憂心煩亂不知所訴乃作離騷經離别也騷愁也經徑也言以放逐離别中心愁思猶陳直徑以諷諌君也故上述唐虞三后之制下序桀紂羿澆之敗冀君覺悟反於正道而還已也是時秦昭王使張儀譎詐懷王令絶齊交又使誘楚請與俱㑹武關遂脅與俱歸拘留不遣卒客死於秦其子襄王復用讒言遷屈原於江南而屈原放在山野復作九章援天引聖以自證明終不見省不忍以清白久居濁世遂赴汩淵自沈而死離騷之文依詩取興引類譬喻故善鳥香草以配忠貞惡禽臭物以比讒佞靈修美人以嫓於君宓妃佚女以譬賢臣虬龍鸞鳯以託君子飄風雲霓以為小人其詞溫而雅其義皎而朗凡百君子莫不慕其清髙嘉其文采哀其不遇而閔其志焉帝髙陽之苗裔兮朕皇考曰伯庸攝提貞于孟陬兮惟庚寅吾以降皇覽揆余初度兮肇錫余以嘉名名余曰正則兮字余曰靈均紛吾既有此內美兮又重之以修能扈江離與辟芷兮紉秋蘭以為佩汩豫若將不及兮恐年嵗之不吾與朝搴阰之木蘭兮夕攬洲之宿莽日月忽其不淹兮春與秋其代序惟草木之零落兮恐美人之遲莫不撫壯而棄穢兮何不改乎此度也乘騏驥以馳騁兮來吾導夫先路也昔三后之純粹兮固衆芳之所在雜申椒與箘桂兮豈惟紉夫蕙茞彼堯舜之耿介兮既遵道而得路何桀紂之昌披兮夫惟捷徑以窘步惟黨人之愈樂兮路幽昧以險隘豈豫身之憚殃兮恐皇輿之敗績忽奔走以先後兮及前王之踵武荃不察余之中情兮反信讒而齎怒豫固知謇謇之為患兮忍而不能舍也指九天以為正兮夫惟靈修之故也初既與豫成言兮後悔遁而有他余既不難夫離别兮傷靈修之數化余既滋蘭之九畹兮又樹蕙之百畝畦留夷與揭車兮雜杜衡與芳芷冀枝葉之峻茂兮願俟時乎吾將刈雖萎絶其亦何傷兮哀衆芳之蕪穢衆皆競進而貪婪兮憑不厭乎求索羌內恕已以量人兮各興心而嫉妬忽馳騖以追逐兮非余心之所急老冉冉其將至兮恐修名之不立朝飲木蘭之墜露兮夕餐秋菊之落英茍余情其信姱以練要兮長顑頷亦何傷攬木根以結茝兮貫薜荔之落蕊矯箘桂以紉蘭兮索胡繩之纚纚謇吾法夫前修兮非世俗之所服雖不周于今之人兮願依彭咸之遺則長太息以掩涕兮哀民生之多艱余雖好修姱以鞿羈兮謇朝誶而夕替既替余以蕙纕兮又申之以攬茝亦余心之所善兮雖九死其猶未悔怨靈修之浩蕩兮終不察夫民心衆女嫉余之娥眉兮謡諑謂余以善淫固時俗之工巧兮偭規矩而改錯背繩墨以追曲兮競周容以為度忳鬱邑余侘􅀈兮吾獨窮困乎此時也寧溘死而流亡兮余不忍為此態也鷙鳥之不羣兮自前世而固然何方圜之能周兮夫孰異道而相安屈心而抑志兮忍尤而攘詬伏清白以死直兮固前聖之所厚悔相道之不察兮延佇乎吾將反回朕車以復路兮及行迷之未逺步余馬於蘭皋兮馳椒邱且焉止息進不入以離尤兮退將修吾初服製芰荷以為衣兮集芙蓉以為裳不吾知其亦已兮茍余情其信芳髙余冠之岌岌兮長余佩之陸離芳與澤其雜糅兮惟昭質其猶未虧忽反顧而遊目兮將往觀乎四荒佩繽紛其繁飾兮芳菲菲其彌章民生各有所樂兮余獨好修以為常雖體解吾猶未變兮豈余心之可懲女嬃之蟬媛兮申申其詈余曰鯀婞直以亡身兮終然夭乎羽之野女何博謇而好修兮紛獨有此姱節薋菉葹以盈室兮判獨離而不服衆不可户說兮孰云察余之中情世並舉而好朋兮夫何煢獨而不余聽依前聖以節中兮喟憑心而歷兹濟沅湘以南征兮就重華而陳辭啓九辨與九歌兮夏康娛以自縱不顧難以圖後兮五子用失乎家巷羿淫逰以佚田兮又好射夫封狐固亂流其鮮終兮浞又貪夫厥家澆身被服強圉兮縱欲而不忍日康娛而自忘兮厥首用夫顛隕夏桀之常違兮乃遂焉而逄殃后辛之菹醢兮殷宗用之不長湯禹嚴而祗敬兮周論道而莫差舉賢而授能兮循繩墨而不頗皇天無私阿兮覽民德焉錯輔夫惟聖哲以茂行兮茍得用此下土瞻前而顧後兮相觀民之計極夫孰非義而可用兮孰非善而可服阽余身而危死兮覽余初其猶未悔不量鑿而正枘兮固前修以菹醢曽歔欷余鬱邑兮哀朕時之不當攬茹蕙以掩涕兮霑余襟之浪浪跪敷衽以陳辭兮耿吾既得此中正駟玉虯以乘翳兮溘埃風余上征朝發軔于蒼梧兮夕余至乎縣圃欲少留此靈瑣兮日忽忽其將莫吾令羲和弭節兮望淹兹而勿迫路曼曼其修逺兮吾將上下而求索飲余馬于咸池兮總豫轡乎扶桑折若木以拂日兮聊須㬰以相羊前望舒使先驅兮後飛廉使奔屬鸞皇為余先戒兮雷師告余以未具吾令鳯鳥飛騰兮繼之以日夜飄風屯其相離兮率雲霓而來御紛總總其離合兮斑陸離其上下吾令帝閽開關兮倚閶闔而望余時曖曖其將罷兮結幽蘭而延佇世溷濁而不分兮好蔽美而嫉妬朝吾將濟子白水兮登閬風而緤馬忽反顧以流涕兮哀髙丘之無女溘吾逰此春宫兮折瓊枝以繼佩及榮華之未落兮相下女之可詒吾令豐隆乘雲兮求宓妃之所在解佩纕以結言兮吾令蹇修以為理紛總總其離合兮忽緯繣其難遷夕歸次于窮石兮朝濯髮乎洧槃保厥美以驕敖兮日康娛以淫遊雖信美而無禮兮來違棄而改求覽觀于四極兮周流乎天余乃下望瑶臺之偃蹇兮見有娥之佚女吾令鴆為媒兮鴆告余以不好雄鳩之鳴逝兮豫猶惡其佻巧心猶豫而狐疑兮欲自適而不可鳯皇既受詒兮恐髙辛之先我欲逺集而無所止兮聊浮逰以逍遙及少康之未家兮留有虞之二姚理弱而媒拙兮恐導言之不固世溷濁而嫉賢兮好蔽美而稱惡閨中既以邃逺兮哲王又不寤懷朕情而不發兮余焉能忍與此終古索瓊茅以筳篿兮命靈氛為余占之曰兩美其必合兮孰信修而慕之思九州之博大兮豈惟是其有女曰勉逺逝而無疑兮孰求美而釋女何所獨無芳草兮爾何懷乎故宇世幽昧以昡曜兮孰云察余之善惡民好惡其不同兮惟此黨人其獨異户服艾以盈要兮謂幽蘭其不可佩覽察草木其猶未得兮豈珵美之能當蘇糞壤以充幃兮謂申椒其不芳欲從靈氛之吉占兮心猶豫而狐疑巫咸將夕降兮懷椒糈而要之百神翳其備降兮九疑繽其並迓皇剡剡其掦靈兮告余以吉故曰勉升降以上下兮求矩彠之所同湯禹嚴而求合兮摯咎繇而能調茍中情其好修兮何必用夫行媒說操築于傅嚴兮武丁用而不疑吕望之鼓刀兮遭周文而得舉寧戚之謳歌兮齊桓聞以該輔及年嵗之未晏兮時亦猶其未央恐鵜鴂之先鳴兮使夫百草為之不芳何瓊佩之偃蹇兮衆薆然而蔽之惟此黨人之不諒兮恐嫉妬而折之時繽紛其變易兮又何可以淹留蘭芷變而不芳兮荃蕙化而為茅何昔日之芳草兮今直為此蕭艾也豈其有他故兮莫好修之害也余以蘭為可恃兮羌無實而容長委厥美以從俗兮茍得列乎衆芳椒専佞以慢慆兮榝又欲充夫佩幃既干進而務入兮又何芳之能祗固時俗之流從兮又孰能無變化覽椒蘭其若兹兮又況揭車與江離惟兹佩其可貴兮委厥美而歷兹芳菲菲而難虧兮芬至今猶未沫和調度以自娛兮聊浮遊而求女及余飾之方壯兮周流觀乎上下靈氛既告余以吉占兮歷吉日乎吾將行折瓊枝以為羞兮精瓊爢以為粻為余駕飛龍兮雜瑶象以為車何離心之可同兮吾將逺逝以自疏邅吾道夫昆侖兮路修逺以周流掦雲霓之暗藹兮鳴玉鸞之啾啾朝發軔于天津兮夕余至乎西極鳯皇翼其承旗兮髙翺翔之翼翼忽吾行此流沙兮遵赤水而容與麾蛟龍使梁津兮詔西皇使涉余路修逺以多艱兮騰衆車使徑待路不周以左轉兮指西海以為期屯余車其千乘兮齊玉車犬而並馳駕八龍之婉婉兮載雲棋之委移抑志而彌節兮神髙馳之邈邈奏九歌而舞韶兮聊假日以偷樂升皇之赫戲兮忽臨睨夫舊鄉僕夫悲余馬懷兮蜷局顧而不行亂曰已矣哉國無人兮莫我知兮又何懷乎故都既莫足與為美政兮吾將從彭咸之所居九歌九歌者屈原之所作也昔楚南郢之邑沅湘之間其俗信鬼而好祀其祠必作樂鼓舞以樂諸神屈原放逐竄伏其域懷憂苦毒愁思怫鬱出見俗人祭祀之禮歌舞之樂其詞鄙陋因為作九歌之曲上陳事神之敬下以見已之冤結託之以風諫故其文義不同章句雜錯而廣異義焉吉日兮辰良穆將愈兮上皇撫劍兮玉珥璆鏘鳴兮琳琅瑶席兮玉瑱盍將把兮瓊芳蕙肴蒸兮蘭藉奠桂酒兮椒漿掦枹兮拊鼓疏緩節兮安歌陳竽瑟兮浩倡靈偃蹇兮姣服芳菲菲兮滿堂五音紛兮繁㑹君欣欣兮樂康東皇太一浴蘭湯兮沐芳華采衣兮若英靈連蜷兮既留爛昭昭兮未央蹇將憺兮夀宫與日月兮齊光龍駕兮帝服聊翺逰兮周章靈皇皇兮既降猋逺舉兮雲中覽冀州兮有餘橫四海兮焉窮思夫君兮太息極勞心兮􅍵􅍵雲中君君不行兮夷猶蹇誰留兮中洲美要眇兮宜修沛吾乘兮桂舟令沅湘兮無波使江水兮安流望夫君兮未來吹參差兮誰思駕飛龍兮北征邅吾道兮洞庭薜荔拍兮蕙綢蓀橈兮蘭旌望涔陽兮極浦橫大江兮掦靈掦靈兮未極女嬋媛兮為余太息橫流涕兮潺湲隱思君兮陫側桂櫂兮蘭枻斫冰兮積雪采薜荔兮水中搴芙蓉兮木末心不同兮媒勞恩不甚兮輕絶石瀨兮淺淺飛龍兮翩翩交不忠兮怨長期不信兮告余以不閒鼂騁騖兮江臯夕弭節兮北渚鳥次兮屋上水周兮堂下捐余玦兮江中遺余佩兮灃浦采芳洲兮杜若將以遺兮下女時不可兮再得聊逍遙兮容與湘君帝子降兮北渚目眇眇兮愁余嫋嫋兮秋風洞庭波兮木葉下登白薠兮聘望與佳期兮夕張鳥何萃兮蘋中罾何為兮木上沅有芷兮灃有蘭思公子兮未敢言荒忽兮逺望觀流水兮潺湲麋何食兮庭中蛟何為兮水裔朝馳余馬兮江臯夕濟兮西澨聞佳人兮召豫將騰駕兮偕逝築室兮水中葺之兮荷蓋蓀壁兮紫壇播芳椒兮盈堂桂棟兮蘭橑辛夷楣兮藥房罔薜荔兮為帷劈蕙櫋兮既張白玉兮為鎮疏石蘭兮為芳芷葺兮荷屋繚之兮杜蘅合百草兮實庭建芳馨兮廡門九疑繽兮並迎靈之來兮如雲捐余袂兮江中遺余褋兮醴浦搴汀洲兮杜若將以遺兮逺者時不可兮驟得聊逍遙兮容與湘夫人廣開兮天門紛吾乘兮𤣥雲令飄風兮先驅使涷雨兮灑塵君回翔兮以下踰空桑兮從女紛總總兮九州何夀夭兮在豫髙飛兮安翔乘清氣兮御隂陽吾與君兮齊速道帝之兮九坑靈衣兮披披玉佩兮陸離一隂兮一陽衆莫知兮余所為折疏麻兮瑶華將以遺兮離居老冉冉兮既極不濅近兮踰疏乘龍兮轔轔髙駝兮冲天結桂枝兮延竚羌踰思兮愁人愁人兮奈何願若今兮無虧固人命兮有當孰離合兮可為大司命秋蘭兮蘪蕪羅生兮堂下緑葉兮素枝芳菲菲兮襲豫夫人兮自有美子荃何以兮愁苦秋蘭兮青青緑葉兮紫莖滿堂兮美人忽獨與余兮目成入不言兮出不辭乘回風兮載雲旗悲莫悲兮生别離樂莫樂兮新相知荷衣兮蕙帶倏而來兮忽而逝夕宿兮帝郊君誰須兮雲之際與女沐兮咸池晞女髮兮陽之阿望美人兮未來臨風恍兮浩歌孔蓋兮翠旌登九天兮撫彗星竦長劍兮擁幼艾荃獨宜兮為民正少司命暾將出兮東方照吾檻兮扶桑撫余馬兮安驅夜皎皎兮既明駕龍輈兮乘雷載雲旗兮委蛇長太息兮將上心低佪兮顧懷羌色聲兮娛人觀者憺兮忘歸縆瑟兮交鼓簫鐘兮瑶簴鳴䶵兮吹竽思靈保兮賢姱翾飛兮翠曽展詩兮㑹舞應律兮合節靈之來兮蔽日青雲衣兮白霓裳舉長矢兮射天狼操余弧兮反淪降援北斗兮酌桂漿撰余轡兮髙馳翔杳冥冥兮以東行東君與女逰兮九河衝風起兮水橫波乘水車兮荷蓋駕兩龍兮驂螭登崑崙兮四望心飛掦兮浩蕩日將暮兮悵忘歸惟極浦兮寤懷魚鱗屋兮龍堂紫貝闕兮朱宫靈何為兮水中乘白黿兮逐文魚與女逰兮河之渚流澌紛兮將來下子交手兮東行送美人兮南浦波滔滔兮來迎魚鄰鄰兮媵豫河伯若有人兮山之阿被薜荔兮帶女蘿既含睇兮又宜笑子慕豫兮善窈窕乘赤豹兮從文貍辛夷車兮結桂旗被石蘭兮帶杜蘅折芳馨兮遺所思余處幽篁兮終不見天路險難兮獨後來表獨立兮山之上雲容容兮而在下杳冥冥兮羌晝晦東風飄兮神靈雨留靈修兮憺忘歸嵗既晏兮孰華豫采三秀兮於山間石磊磊兮葛蔓蔓怨公子兮悵忘歸君思我兮不得間山中人兮芳杜若飲石泉兮䕃松柏君思我兮然疑作靁填填兮雨冥冥猿啾啾兮狖夜鳴風颯颯兮木蕭蕭思公子兮徒離憂山鬼操吳戈兮被犀甲車錯轂兮短兵接旌蔽日兮敵若雲矢交墜兮士爭先陵豫陳兮躐豫行左驂殪兮右刃傷霾兩輪兮縶四馬援玉枹兮擊鳴鼓天時懟兮威靈怒嚴殺盡兮棄原野出不入兮往不反平原忽兮路超逺帶長劍兮挾秦弓首雖離兮心不懲誠既勇兮又以武終剛强兮不可陵身既死兮神以靈魂魄毅兮為鬼雄國殤盛禮兮㑹鼓傳芭兮代舞姱女倡兮容與春蘭兮秋菊長無絶兮終古禮魂
