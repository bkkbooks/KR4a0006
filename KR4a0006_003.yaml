body:
  text: 九章傳九章者屈原之所作也屈原於江南之野思君念國憂思罔極故復作九章章者著明也言巳所陳忠信之道甚著明也卒不見納委命自沈楚人惜而哀之世論其詞以相傳焉惜誦以致愍兮發憤以抒情所非忠而言之兮指蒼天以為正令五帝以折中兮戒六神以鄉服俾山川以備御兮㑹咎繇以聴直竭忠誠以事君兮反離羣而贅肬忘儇媚以背衆兮待明君其知之言與行其可迹兮情與貌其不變故相臣莫若君兮所以證之不逺吾誼先君而後身兮羌衆人之所仇也専惟君而無他兮又衆兆之所讐也壹心而不豫兮羌不可保也疾親君而無他兮有招禍之道也思君其莫我忠兮忽忘身之賤貧事君而不貳兮迷不知寵之門忠何辠以遇罰兮亦非余之所志也行不羣以顛越兮又衆兆之所咍也紛逢尤以離謗兮謇不可釋也情沈抑而不達兮又蔽而莫之白也心鬱邑余侘􅀈兮又莫察余之中情固煩言不可結詒兮願陳志而無路退静黙而莫余知兮進號呼又莫吾聞申侘􅀈之煩惑兮中悶瞀之忳忳昔余夢登天兮魂中道而無杭吾使厲神占之兮曰有志極而無旁終危獨以離異兮曰君可思而不可恃故衆口其鑠金兮初若是而逢殆懲于羹而吹韲兮何不變此志也欲釋階而登天兮猶有曩之態也衆駭遽以離心兮又何以為此伴也同極而異路兮又何以為此援也申生之孝子兮父信讒而不好行婞直而不豫兮鯀功用而不就吾聞作忠以造怨兮忽謂之過言九折臂而成醫兮吾今而知其然矰弋機而在上兮罻羅張而在下設張辟以娛君兮願側身而無所欲邅回以干傺兮恐重患而離尤欲髙飛而逺集兮君罔謂女何之欲横奔而失路兮堅志而不忍背膺牉其交痛兮心菀結而紆軫𢷬木蘭以撟蕙兮糳申椒以為糧播江離與滋菊兮願春日以為糗芳恐情質之不信兮故重著以自明矯兹媚以私處兮願曾思而逺身惜誦余幼好此竒服兮年既老而不衰帶長鋏之陸離兮冠切雲之崔嵬被明月兮佩寶璐世溷濁而莫予知兮吾方髙馳而不顧駕青虯兮驂白螭吾與重華逰兮瑶之圃登昆侖兮食玉英與天地兮同夀與日月兮齊光哀南夷之莫我知兮旦余濟于湘江乗鄂渚而反顧兮欸秋冬之緒風步余馬兮山皋邸余車兮方林乗舲船余上沅兮齊吳榜以擊汰船容與而不進兮淹回水而疑滯朝𤼵枉渚兮夕宿辰陽茍余心其端直兮雖辟逺其何傷入溆浦余邅回兮迷不知吾所如深林杳以㝠㝠兮乃猨狖之所居山高高而蔽日兮下幽晦以多雨霰雪紛其無垠兮雲霏霏而承宇哀吾生之無樂兮幽獨處乎山中吾不能變心而從俗兮固將愁苦而終窮接輿髠首兮桑扈臝行忠不必用兮賢不必以伍子逢殃兮比干菹醢與前世而皆然兮吾又何怨乎今之人余將董道而不豫兮固將重昬而終身亂曰鸞鳥鳳皇日以逺兮燕雀烏鵲巢堂壇兮露申辛夷死林薄兮腥臊並御芳不得薄兮隂陽易位時不當兮懷信侘􅀈忽乎吾將行兮渉江皇天之不純命兮何百姓之震愆民離散而相失兮方仲春而東遷去故鄉而就逺兮遵江夏以流亡出國門而軫懐兮甲之朝吾以行發郢而去閭兮荒忽其焉極楫齊揚以容與兮哀見君而不再得望長楸而太息兮涕淫淫其若霰過夏首而西浮兮顧龍門而不見心蟬媛而傷懷兮眇不知其所蹠順風波以從流兮焉洋洋而為客陵陽侯之汜濫兮忽翺翔而焉薄心絓結而不解兮思蹇産而不釋將運舟而下浮兮上洞庭而下江去終古之所居兮今逍遥而來東羌靈魂之欲歸兮何須㬰而忘反背夏浦而西思兮哀故都之日逺登大墳以逺望兮聊以舒吾憂心哀州土之平樂兮悲江介之遺風當陵陽之焉至兮淼南度之焉如曾不知夏之為邱兮就兩東門之可蕪心不怡之長久兮憂與憂其相接惟郢路之遼逺兮江與夏之不可涉忽若去不信兮至今九年而不復懆鬱鬱而不開兮蹇侘􅀈而含慼外承歡之汋約兮諶荏弱而難持忠湛湛而願進兮妒披離而鄣之堯舜之抗行兮杳杳而薄天衆䜛人之嫉妬兮被以不慈之偽名憎愠惀之修美兮好夫人之忼慨衆躞蹀而日進兮美超逺而踰邁亂曰曼予目以流觀兮兾壹反之何時鳥飛反故鄉兮狐死必首邱信非吾罪而棄逐兮何日夜而忘之哀郢心鬱鬱之憂思兮獨永歎乎曾傷思蹇産之不釋兮曼遭夜之方長悲夫秋風之動容兮何四極之浮浮數惟荃之多怒兮傷余心之􅀈􅀈願揺赴而横奔兮覽民尤以自鎮結微情以陳辝兮矯以遺夫美人昔君與我成言兮曰黄昬以為期羌中道而回畔兮反既有此他志憍吾以其美好兮覽余以其修姱與余言而不信兮盖為余而造怒願承間而自察兮心震悼而不敢悲夷猶而兾進兮心怛傷之憺憺厯兹情以陳辝兮荃詳聾而不聞固切人之不媚兮衆果以我為患初吾所陳之耿著兮豈至今其庸亡何獨樂斯之謇謇兮願荃美之可完望三五以為象兮指彭咸以為儀夫何極而不至兮故逺聞而難虧善不由外來兮名不可以虛作孰無施而有報兮孰不實而有穫少歌曰與美人之抽思兮并日夜而無正憍吾以其美好兮敖朕辭而不聴倡曰有鳥自南兮來集漢北好姱佳麗兮牉獨處此異域既惸獨而不羣兮又無良媒在其側道逴逺而日忘兮願自申而不得望南山而流涕兮臨流水而太息望孟夏之短夜兮何晦明之若嵗惟郢路之遼逺兮魂一夕而九逝曾不知路之曲直兮南指月與列星願徑逝而不得兮魂識路之營營何靈魂之信直兮人之心不與吾心同理弱而媒不通兮尚不知余之從容亂曰長瀨湍流沂江潭兮狂顧南行以娛心兮軫石嵗嵬蹇吾願兮超回志度行隠進兮低回夷猶宿北姑兮煩冤瞀容寔沛徂兮愁歎苦神靈遥思兮路逺處幽又無行媒兮道思作頌聊自救兮憂心不遂斯言誰告兮抽思滔滔孟夏兮草木莽莽傷懷永哀兮汩徂南土眴兮窈窈孔静幽黙菀結紆軫兮離愍而長鞫撫情効志兮俛詘以自抑刓方以為圜兮常度未暜易初本迪兮君子所鄙章畫志墨兮前圖未改内厚質正兮大人所晠巧倕不斲兮孰察其揆正元文處幽兮矇謂之不章離婁㣲睇兮瞽以為無明變白而為黒兮倒上以為下鳯皇在笯兮雞鶩翔舞同糅玉石兮一槩而相量夫惟黨人之鄙固兮羌不知吾所臧任重載盛兮陷滯而不濟懐瑾握瑜兮窮不知所示邑犬羣吠兮吠所怪也誹駿疑桀兮固庸態也文質疏内兮衆不知吾之異采材樸委積兮莫知余之所有重仁襲義兮謹厚以為豐重華不可遌兮孰知余之從容古固有不並兮豈知其故也湯禹久逺兮邈不可慕也懲違改忿兮抑心而自彊離愍而不遷兮願志之有象進路北次兮日昧昧其將莫舒憂娯哀兮限之以大故亂曰浩浩沅湘分流汩兮修路幽茀道逺忽兮增傷爰哀永歎喟兮世既莫吾知人心不可謂兮懷情抱質獨無匹兮伯樂既沒驥將焉思美人兮擥涕而竚眙媒絶路阻兮言不可結而詒蹇蹇之煩冤兮陷滯而不𤼵申旦以舒中情兮志沈菀而莫達願寄言于浮雲兮遇豐隆而不將因歸鳥而致辝兮乃迅髙而難當苦髙辛之靈晟兮遭元鳥而致貽欲變節以從俗兮媿易初而屈志獨厯年而離愍兮羌馮心猶未化寧隠閔而夀考兮何變易之可為知前轍之不遂兮未改此度車既覆而馬顛兮蹇獨懷此異路勒騏驥而更駕兮造父為我操之遷逡次而勿驅兮聊假日以須時指嶓冢之西隈兮與纁黄以為期開春𤼵嵗兮白日出之悠悠吾將蕩志而媮樂兮遵江夏以娛憂擥大薄之芳茝兮搴長洲之宿莽惜吾不及古人兮吾誰與玩此芳草解篇薄與雜菜兮備以為交佩佩繽紛其繚轉兮遂萎絶而離異吾且邅回以娛憂兮觀南人之變態竊快在中心兮揚厥馮而不竢芳與澤其雜糅兮羌芳華自中出紛郁郁其逺烝兮滿内而外揚情與質信可保兮羌重蔽而聞章令薜荔以為理兮憚舉趾而縁木因芙蓉而為媒兮憚蹇裳而濡足登髙吾不説兮入下吾不能固朕形之不服兮然容與而狐疑廣遂前晝兮未改此度也命則處幽吾將罷兮願及白日之未莫也獨煢煢而南行兮思彭咸之故也思美人惜往日之曾信兮受命詔以昭時奉先功以照下兮明法度之嫌疑國富彊而法立兮屬貞臣而日娛秘密事之載心兮雖過失猶弗治心純龎而不泄兮遭讒人而嫉之君含怒而待臣兮不清澂其然否蔽晦君之聰明兮虛惑誤又以欺弗參驗以考實兮逺遷臣而弗思信讒諛之溷濁兮盛氣志而過之何貞臣之無辠兮被讟謗而見尤慙光景之誠信兮身幽隠而備之臨江湘之元淵兮遂自忍而沈流卒沒身而絶名兮惜雝君之不昭君無度而弗察兮使芳草為藪幽焉舒情而抽信兮恬死亡而不聊獨鄣雝而蔽隠兮使貞臣為無由聞百里之為虜兮伊尹享于庖厨吕望屠于朝歌兮甯戚歌而飯牛不逢湯武與桓繆兮世孰云而知之吳信讒而弗味兮子胥死而後憂介子忠而立枯兮文君寤而追求封介山而為之禁兮報大徳之優㳺思久故之親身兮因縞素而哭之或忠信而死節兮或詑謾而不疑弗省察而按實兮聴讒人之虛辭芳與澤其雜糅兮孰申旦而别之何芳草之早夭兮微霜降而下戒諒聰不明而蔽雝兮使讒諛而日得自前世之嫉賢兮謂蕙若其不可佩妬娃冶之芬芳兮􅙵母姣而自好雖有西施之美容兮讒妒入以自代願陳情以白行兮得罪過之不意情冤見之日明兮如列宿之錯置乗騏驥而馳騁兮無轡銜而自載乗汜泭以下流兮無舟楫而自備背法度而心治兮辟與此其無異寧溘死而流亡兮恐禍殃之有再不畢辝而赴淵兮惜雝君之不識惜往日后皇嘉樹橘徠服兮受命不遷生南國兮深固難徙更壹志兮緑葉素榮紛其可喜兮曽枝剡㯤圜實博兮青黄雜糅文章爛兮精色内白類任道兮紛緼宜修姱而不醜兮嗟爾㓜志有以異兮獨立不遷豈不可喜兮深固難從廓其無求兮蘇世獨立横而不流兮閉心自慎終不過失兮秉徳無私參天地兮願嵗并謝與長友兮淑離不滛梗其有理兮年嵗雖少可師長兮行比伯夷置以為象兮橘頌悲回風之搖蕙兮心菀結而内傷物有微而隕性兮聲有隠而先倡夫何彭咸之造思兮暨志介而不忘萬變其情豈可盖兮孰虛偽之可長鳥獸鳴以號羣兮草苴比而不芳魚葺鱗以自别兮蛟龍隠其文章故茶薺不同畝兮蘭茝幽而獨芳惟佳人之永都兮更統世以自况𣺌逺志之所及兮憐浮雲之相洋介𦕈志之所惑兮竊賦詩之所明惟佳人之獨懷兮折芳椒以自處曾歔欷之嗟嗟兮獨隠伏而思慮涕泣交而淒淒兮思不眠而極曙終長夜之漫漫兮掩此哀而不去寤從容以周流兮聊逍遥以自持傷太息之愍憐兮氣於邑而不可止糾思心以為鑲兮偏愁苦以為膺折若木以蔽光兮随飄風之所仍存髣髴而不見兮心踊躍其若湯撫佩袵以案志兮超惘惘而遂行嵗䀜䀜其若頽兮時亦冉冉而將至蘋衡槁而節離兮芳已歇而不比憐思心之不可懲兮證此言之不可聊寧􅀈死而流亡兮不忍此心之常愁孤子唫而抆淚兮放子出而不還孰能思而不隠兮昭彭咸之所聞登石巒以逺望兮路眇眇之黙黙入景響之無應兮聞省想而不可得愁鬱鬱之無快兮居戚戚而不可解心鞿羈而不開兮氣繚轉而自締穆眇眇之無垠兮莽芒芒之無儀聲有隠而相感兮物有純而不可為藐曼曼之不可量兮縹綿綿之不可紆愁悄悄之常悲兮翩𡨕㝠之不可娯陵大波而流風兮託彭咸之所居上髙巖之峭岸兮處雌蜺之標顛據青㝠而攄虹兮遂儵忽而捫天吸湛露之浮涼兮潄凝霜之雰雰依風冗以自息兮忽傾寤以蟬媛馮昆侖以瞰霧兮隠㞶山以清江憚涌湍之􅀈􅀈兮聴波聲之􅞇洶紛容容之無徑兮㒺芒芒之無紀軋洋洋之無從兮馳委移之焉止飄幡幡其上下兮翼遥遥其左右汜潏潏其前後兮伴張弛之信期觀炎氣之相仍兮窺煙液之所積悲霜雪之俱下兮聴潮水之相撃借光景以徃來兮施黄㯤之枉策求介子之所存兮見伯夷之放迹心調度而不去兮刻著志之無適曰吾怨徃昔之所兾兮悼來者之悐悐浮江淮而入海兮從子胥而自適望大河之洲渚兮悲申徒之抗迹驟諌君而不聴兮任重石之何益心絓結而不解兮思蹇産而不釋悲回風逺遊傳逺遊者屈原之所作也屈原履方直之行不容於世上為讒佞所譛毁下為俗人所困極章皇山澤無所告訴乃深惟元一修軌恬漠思欲濟世則意中憤然文采秀𤼵遂叙妙思託配仙人與俱遊獻周厯天地無所不到然猶懷念楚國思慕舊故忠信之篤仁義之厚也是以君子珍重其志而瑋其辭焉悲時俗之迫阸兮願輕舉而逺逰質菲薄而無因兮焉託乘而上浮遭沈濁之汚穢兮獨菀結其誰語夜耿耿而不昧兮魂營營而至曙惟天地之無窮兮哀人生之長勤往者予弗及兮來者予弗聞歩徙倚而遥思兮怊惝怳而乖懷意恍惚而流蕩兮心愁淒而曽悲神儵忽而不及兮形枯槁而獨留内惟省以端操兮求正氣之所由漠虚静以恬愉兮澹無為而自得聞赤松之清塵兮願承風乎遺則貴至人之休徳兮美往世之登仙與化去而不見兮名聲著而日延竒傅説之託辰星兮羡韓終之得一形穆穆以寖逺兮離人羣而遁逸因氣變而遂曽舉兮忽神奔而鬼怪時髣髴以遥見兮精皎皎而往來絶氛埃而淑郵兮終不反乎故都免衆患而不懼兮世莫知其所如恐天時之代序兮耀靈曄而西征微霜䧏而下淪兮悼芳草之先零聊仿佯而逍遥兮永歴年而無成誰可與玩斯遺芳兮長鄉風而舒情髙陽邈已逺兮予將焉所程重曰春秋忽其不淹兮奚久留此故居軒轅不可攀援兮吾將從王喬而娛戯餐六氣而飲沆瀣兮潄正陽而含朝霞保神明之清澂兮精氣入而麤穢除順凱風以從遊兮至南巢而壹息見王子而宿之兮審壹氣之和徳曰道可受兮不可傳其小無内兮其大無垠無淈而魂兮彼將自然壹氣孔神兮於中夜存虚以待之兮無為之先庶類以成兮此徳之門聞至貴而遂徂兮忽乎吾將行仍羽人於丹邱兮留不死之舊鄉朝濯髮于湯谷兮夕晞余身乎九陽吸飛泉之微液兮懷琬琰之華英玉色艵以脕顔兮精醇粹而始壯質銷鑠以汋約兮神要𦕈以滛放嘉南州之炎徳兮麗桂樹之冬榮山蕭條而無獸兮野􅀢漠其無人載營魄而登霞兮掩浮雲而上征命天閽其開闗兮排閶闔而望予召豐隆使先導兮問太微之所居集重陽入帝宫兮造旬始而觀清都朝𤼵軔于太儀兮夕始臨乎於微閭屯予車之萬乗兮紛容與而並馳駕八龍之婉婉兮載雲祺之委移建雄虹之采旄兮五色雜而炫燿服偃蹇以低昻兮驂連蜷以驕傲騎膠葛以雜亂兮班漫衍而方行撰予轡而正䇿兮吾將過乎句芒厯太皡以右轉兮前飛亷以啓路陽杲杲其未光兮陵天地以徑度風伯為予先驅兮氛埃辟而清涼鳳皇翼其乗旗兮遇蓐收乎西皇擥彗星以為旍兮舉斗柄以為麾判陸離其上下兮遊驚霧之流波時曖睷其曭莽兮召元武而奔屬後文昌使掌行兮選署衆神以並轂路曼曼其修逺兮徐弭節而髙厲左雨師使徑侍兮右雷公以為衛欲度世以忘歸兮意恣睢以担撟内欣欣而自美兮聊媮娛以滛樂渉青雲以汎濫兮忽臨睨夫舊鄉僕夫懷予心悲兮邊馬顧而不行思舊故而想像兮長太息而掩涕汜容與而遐舉兮聊抑志而自弭指炎帝而直馳兮吾將徃乎南疑覽方外之荒忽兮沛􅚡瀁而自浮祝融戒而蹕禦兮騰告鸞鳥迎宓妃張咸池奏承雲兮二女御九韶歌使湘靈鼓瑟兮令海若舞馮夷列螭象而並進兮形蟉蚪而委移雌蜺便娟以曽撓兮鸞鳥軒翥而翔飛音學博衍無終極兮焉乃逝以裵回舒并節以馳騖兮逴絶垠乎寒門軼迅風于清原兮從顓頊乎曽氷厯元㝠以邪徑兮乗間維以反顧召黔嬴而見之兮為予先乎平路經營四荒兮周流六漠上至列缺兮䧏望大壑下峥嶸而無地兮上寥廓而無天視儵忽而無見兮聴惝怳而無聞超無為以至清兮與太初而為鄰卜居傳卜居者屈原之所作也屈原履忠貞之性而見嫉妬念讒佞之臣承君順非而䝉富貴已執忠直而身放棄心迷意惑不知所為乃往至太卜之家稽問神明決之蓍龜卜已居世何所宜行冀聞異䇿以定嫌疑故曰卜居也漁父傳漁父者屈原之所作也屈原放在江湘之間憂愁歎吟儀容變易而漁父避世隠身釣魚江濵欣然自樂時遇屈原川澤之域怪而問之遂相應答楚人思念屈原因叙其辭以相傳焉屈原既放三年不得復見竭知盡忠而蔽鄣於讒心煩慮亂不知所從乃往見太卜鄭詹尹曰余有所疑原因先生決之詹尹乃端䇿拂龜曰君將何以教之屈原曰吾寧悃悃𣢾𣢾朴以忠乎將送徃勞來斯無窮乎寧誅鋤草茅以力耕乎將游大人以成名乎寧正言不諱以危身乎將從俗富貴以媮生乎寧超然髙舉以保真乎將哫訾慓斯喔咿儒兒以事婦人乎寧亷潔正直以自清乎將突梯滑稽如脂如韋以潔楹乎寧昻昻若千里之駒乎將氾氾若水中之鳬與波上下偷以全吾軀乎寧與騏驥亢軛乎將隨駑馬之迹乎寧與黄鵠比翼乎將與雞駑争食乎此孰吉孰凶何去何從世溷濁而不清蟬翼為重千鈞為輕黄鐘毁棄瓦釜雷鳴讒人髙張賢士無名吁嗟黙黙兮誰知吾之亷真詹尹乃釋䇿而謝曰夫尺有所短寸有所長物有所不足智有所不明數有所不逮神有所不通用君之心行君之意龜䇿誠不能知此事卜居屈原既放遊於江潭行吟澤畔顔色憔悴形容枯槁漁父見而問之曰子非三閭大夫與何故至於斯屈原曰舉世皆濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人者不凝滯於物而能與世推移舉世皆濁何不淈其泥而揚其波衆人皆醉何不餔其糟而歠其釃何故懷瑾握瑜而自令見放為屈原曰吾聞之新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎寧赴相流葬於江魚之腹中又安能以皎皎之白而䝉世俗之塵埃乎漁父莞爾而笑鼓枻而去歌曰滄浪之水清兮可以濯吾纓滄浪之水濁兮可以濯吾足遂去不復與言漁父招魂傳招魂者宋玉之所作也招者召也以手曰招以言曰召魂者身之精也宋玉憐哀屈原忠而斥棄愁懣山澤魂魄放佚厥命將落故作招魂欲以復其精神延其年夀外陳四方之惡内崇楚國之美以諷諌懷王冀其覺悟而還之也朕幼清以亷潔兮身服義而未沬主此盛徳兮牽於俗而蕪穢上無所考此盛徳兮長離殃而愁苦帝告巫陽曰有人在下我欲輔之魂魄離㪚汝筮予之巫陽對曰掌㝱上帝其命難從若必筮予之恐後之謝不能復用巫陽焉乃下招曰魂兮歸來去君之恒幹何為乎四方些舍君之樂處而離彼不祥些魂兮歸來東方不可以託些長人千仭惟魂是索些十日代出流金鑠石些彼皆習之魂往必釋些歸來歸來不可以託些魂兮歸來南方不可以止些雕題黒齒得人肉以祀以其骨為醢些蝮蛇蓁蓁封户千里些雄虺九首往來儵忽吞人以益其心些歸來歸來不可以久滛些魂兮歸來西方之􅊣流沙千里些旋入雷淵爢㪚而不可止些岙而得脱其外曠宇些赤螘若象元蠭若壺些五榖不生藂官是食些其土爛人求水無所得些彷徉無所倚廣大無所極些歸來歸來恐自遺賊些魂兮歸來北方不可以止些増氷峨峨飛雪千里些歸來歸來不可以久些魂兮歸來君無上天些虎豹九闗啄害下人些一夫久首㧞木九千些犲狼從目往來侁侁些懸人以娭投之深淵些致命於帝然後得瞑些歸來徃恐危身些魂兮歸來君無下此幽都些土伯九約其角觺觺些敦脄血拇逐人駓駓些參目虎首其身若牛些此皆甘人歸來歸來恐自遺災些魂兮歸來入修門些工祝招君背行先些秦篝齊縷鄭綿絡些招具該備永嘯呼些魂兮歸來反故居些天地四方多賊姦些像設君室静閒安些髙堂邃宇檻層軒些層臺累謝臨髙山些網户朱綴刻方連些冬有突厦夏室寒些川谷徑復流潺湲些光風轉蕙汜崇蘭些經堂入奥朱塵筵些砥室翠翹挂曲瓊些翡翠珠被爛齊光些弱阿拂壁羅幬張些纂組綺縞結琦璜些室中之觀多珍怪些蘭膏明燭華容備些二八侍宿射逓代些九侯淑女多迅衆些盛鬋不同制實滿宫些容態好比順彌代些弱顔固植謇其有意些姱容修態絙洞房些蛾眉曼睩目騰光些靡顔膩理遺視矊些離榭脩幕侍君之間些翡帷翠帳飾髙堂些紅壁沙版元玉之梁些仰觀刻桷畫龍蛇坐堂伏檻臨曲池些芙蓉始𤼵雜芰荷些紫莖屏風文縁波些文異豹飾侍陂陁些軒輬既低步騎羅些蘭薄户樹瓊木離些魂兮歸來何逺為些室家遂宗日多方些稻粢穱麥挐黄梁些大苦醎酸辛甘行些肥牛之腱臑若芳些和酸若苦陳呉羮些臑鼈炮羔有拓漿些鵠酸臇鳬煎鴻鶬些露雞臛􅏲厲而不爽些粔籹密弭有餦餭些瑶漿􅀢勺實羽觴些挫糟凍飲酎清涼些華酌既陳有瓊漿些歸反故室敬而無妨些肴羞未通女樂羅些􅞽鍾按鼓造新歌些渉江采菱發揚荷些美人既醉朱顔酡些娭光眇視目曾波些被文服纎麗而不竒些長髮曼鬋豓陸離些二八齊容起鄭舞些祍若交竿撫案下些竿瑟狂㑹搷鳴鼔些宫庭震驚𤼵激楚些吳歈蔡謳奏大吕些士女雜坐亂而不分些放􅞽組纓班其相紛些鄭衞妖玩来雜陳些激楚之結獨秀先些箟􅀢象棊有六博些分曹並進遒相迫些成梟而牟呼五白些晉制犀比費白日些䥶鍾揺簴揳梓瑟些娛酒不廢沈日夜些蘭膏明燭華燈錯些結撰至思蘭芳假些人有所極同心賦些酎飲盡歡樂先故些魂兮歸來反故居些亂曰献嵗𤼵春兮汩吾南征菉蘋齊葉兮白芷生路貫廬江兮左長薄倚沼畦瀛兮遥望博青驪結駟兮齊千乗懸丈延起兮元顔烝歩及驟處兮誘騁先抑騖若通兮引車右還與王趨夢兮課後先君王親發兮憚青兕朱明承夜兮時不可掩皋蘭被徑兮斯路漸湛湛江水兮上有楓目極千里兮傷春心魂兮歸來哀江南大招傳大招者屈原之所作也或曰景差疑不能明也屈原放流九年憂思煩亂精神㪚越與形離别恐命將終所行不遂故憤然大招其魂盛稱楚國之樂崇懷襄之徳以比三王能任用賢公卿明察能薦舉人宜輔佐之以興至治因以風諌達已之志也青春受謝白日昭只春氣奮𤼵萬物遽只㝠淩浹行魂無逃只魂魄歸徠無逺遥只魂乎歸徠無東無西無南無北東有大海溺水浟浟只螭龍並流上下悠悠只霧雨淫淫白皓膠只魂乎無東湯谷􅀢寥只魂乎無南南有炎火千里蝮蜿蜒只山林險隘虎豹蛇只鰅鱅短狐王虺騫只魂乎無南蜮傷躬只魂乎無西西方流沙􅐯洋洋只豕首縱目被髮鬤只長𤓰踞牙誒笑狂魂乎無西多害傷只魂乎無北北有寒山逴龍赩只代水不可渉深不可測只天白顥顥寒凝凝只魂乎無徃盈北極只魂魄歸徠間以静只自恣荆楚安以定只逞志究欲心意安只窮身永樂年壽延只魂兮歸徠樂不可言只五榖六仞設菰梁只鼎臑盈望和致芳只内鶬鴿鵠味豺羮只魂乎歸徠恣所嘗只鮮􅏲甘雞和楚酪只醢豚苦狗膾苴蒪只吳酸蒿蔞不沾薄只魂兮歸徠恣所擇只炙鴰烝鳬煔鶉敶只煎鰿臛雀遽爽存只魂乎歸徠麗以先只四酎并孰不􅀈嗌只清馨凍􅶥不歠役只吳醴白蘖和楚瀝只魂乎歸徠不遽惕只代秦鄭衛鳴竽張只伏戯駕辯楚勞商只謳和揚阿趙簫倡只魂乎歸徠定空桑只二八接武投詩賦只叩鍾調磬娛人亂只四上競氣極聲變只魂乎歸徠聴歌譔只朱唇皓齒嫭以姱只比徳好間習以都只豐肉微骨調以娛只魂乎歸徠安以舒只嫮目未笑娥眉曼只容則秀雅穉朱顔只魂乎歸徠静以安只姱修滂浩麗以佳只曽頰倚耳曲眉䂓只滂心綽態姣麗施只小腰秀頸若鮮畀只魂乎歸徠思怨移只易中利心以動作只粉白黛黒施芳澤只長袂拂面善留客只魏乎歸徠以娛昔只青色直眉美目媔只靨輔竒牙宜笑嘕只豐肉微骨體便娟只魂乎歸徠恣所便只夏屋廣大沙堂秀只南房小壇觀絶霤只曲屋歩壛宜擾只騰駕歩㳺獵春圃只瓊轂錯衡英華假只􅉅蘭桂樹鬰彌路只魂乎歸徠恣志慮只孔雀盈園畜鸞皇只鵾鴻羣辰雜􅒗鶬只鴻鵠代遊曼鷫鷞只魂乎歸徠鳯皇翔只曼澤怡面血氣盛只永宜厥身保壽命只室家盈爵禄盛只魂乎歸徠居室定止接徑千里出若雲只三圭重侯聴類神只察篤夭隠孤寡存只魏兮歸徠正始昆只田邑千畛人异昌只美冐衆流徳澤章只先威後文善美明只魂乎歸徠賞罰當只名聲若日照四海只徳譽配天萬民理只北至幽陵南交趾只西薄羊腸東窮海只魂乎歸徠尚賢士只發政献行禁苛暴只舉傑壓陛珠璣罷只直贏在位近禹麾只豪傑執政流澤施只魂乎歸徠國家為只雄雄赫赫天徳明只三公穆穆登䧏堂只諸侯畢極立九卿只昭質既設大侯張只執弓挾矢揖辝讓只魂乎歸徠尚三王只九辯傳九辯者楚大夫宋玉之所作也辯者變也謂敶道徳以變説君也九者陽之數道之綱紀也故天有九星以正機地地有九州以成萬物人有九竅以通精明屈原懷忠貞之性而被讒邪傷君闇蔽國將危亡乃挼天地之數列人形之要而作九歌九章之頌以諷諌懷王明已所言與天地合度可履而行也宋玉者屈原弟子也閔惜其師忠而放逐故作九辯以述其志至於漢興劉向王褒之徒咸悲其文依而作詞故號為楚詞亦承其九以立義焉悲哉秋之為氣也蕭瑟兮草木揺落而變衰憭慄兮若在逺行登山臨水兮送將歸泬寥兮天高而氣清􅀢􅢏兮收潦而水清㦧悽増欷兮薄寒之中人愴怳懭恨兮去故而就新坎廪兮貧士失職而志不平廓落兮覊旅而無友生惆悵兮而私自憐燕翩翩其辝歸兮蟬􅀢漠而無聲雁雝雝而南遊兮鵾雞啁唽而悲鳴獨申旦而不寐兮哀蟋蟀之宵征時亹亹而過中兮蹇淹留而無成悲憂窮慼兮獨處廓有美一人兮心不繹去鄉離家兮徠逺客超逍遥兮今焉薄専思君兮不可化君不知兮可奈何蓄怨兮積思心煩憺兮忘食事願一見兮道余意君之心兮與余異車既駕兮朅而歸不得見兮心傷悲倚結軨兮長太息涕潺湲兮下霑軾忼慨絶兮不得中瞀亂兮迷惑私自憐兮何極心怦怦兮諒直皇天平分四時兮竊獨悲此凛秋白露旣下降百草兮奄離披此梧楸去白日之昭昭兮襲長夜之悠悠離芳藹之方壯兮余蔞約而悲愁秋既先戒之以白露兮冬又申之以嚴霜收恢􅀢之孟夏兮然欿傺而沈藏葉菸邑而無色兮枝煩挐而交横顔滛溢而將罷兮柯彷彿而萎黄萷櫹槮之可哀兮形銷鑠而瘀傷惟其紛糅而將落兮恨其失時而無當擥騑轡而下節兮聊逍遥以相佯嵗忽忽而道盡兮恐余壽之弗將悼余生之不時兮逢此世之俇攘澹容與而獨倚兮蟋蟀鳴此西堂心怵惕而震盪兮何所憂之多方仰明月而歡息兮步列星而極明竊悲夫蕙華之曽敷兮紛旖旎乎都房何曽華之無實兮從風雨而飛颺以為君獨服此蕙兮𦍑無以異於衆芳閔竒思之不通兮將去君而髙翔心閔憐之慘悽兮願一見而有明重無怨而生離兮中結軫而増傷豈不鬱陶而思君兮君之門以九重猛犬狺狺而迎吠兮闗梁閉而不通皇天滛溢而秋霖兮后土何時而得漧塊獨守此無澤兮仰浮雲而永歎何時俗之工巧兮背繩墨而改錯却騏驥而不乗兮䇿駑駘而取路當世豈無騏驥兮誠莫之能善御見執轡者非其人兮故跼跳而逺去鳬鴈皆唼夫梁藻兮鳯愈飄翔而髙舉圜鑿而方枘兮吾固知其鉏鋙而難入衆鳥皆有所登棲兮鳯獨惶惶而無所集願銜枚而無言兮嘗被君之渥洽太公九十乃顯榮兮誠未遇其匹合謂騏驥兮安歸謂鳯皇兮安棲變古易俗兮世衰今之相者兮舉肥騏驥伏匿而不見兮鳯皇髙飛而不下鳥獸猶知懷徳兮何云賢士之不處驥不驟進而求服兮鳯亦不貪餧而忘食君棄逺而不察兮雖願忠其焉得欲寂寞而絶端兮竊不敢忘初之厚徳獨悲愁其傷人兮馮鬱鬱其安極霜露慘悽而交下兮心尚幸其弗濟霰雪雰糅其増加兮乃知遭命之將至願徼幸而有待兮汩莾莽兮與野草同死願自往而徑遊兮路壅絶而不通欲循道而平驅兮又未知其所徒然中路而迷惑兮自壓按而學誦性愚陋以褊淺兮信未達乎從容竊美申包胥之氣盛兮恐時世之不固何時俗之工巧兮滅規矩而改鑿獨耿介而不隨兮願慕先聖之遺教處濁世而顯榮兮非余心之所樂與其無義而有名兮寧窮處而守髙食不媮而為飽兮衣不茍而為温竊慕詩人之遺風兮願託志乎素餐蹇充倔而無端兮汩莽莽而無垠無衣裘以禦冬兮恐溘死而不得見乎陽春靚杪秋之遥夜兮心憭悷而有哀春秋逴逴而日髙兮然惆悵而自悲四時逓來而卒嵗兮隂陽不可與儷偕白日晼晼其將入兮明月銷鑠而減毁嵗忽忽而道盡兮老冉冉而俞弛心揺悦而日􅀢兮然怊悵而無兾中㦧惻之悽愴兮長太息而増欷年洋洋以日往兮老嵺廓而無處事亹亹而覬進兮分蹇淹留而躊躇何汜濫之浮雲兮猋壅蔽此明月忠昭昭而願見兮然䨧曀而莫達願皓日之顯行兮雲濛濛而蔽之竊不自聊而願忠兮或黕㸃而汙之堯舜之抗行兮瞭㝠㝠而薄天何險巇之嫉妬兮被以不慈之偽名彼日月之照明兮尚黯黮而有睱何況一國之事兮亦多端而膠加被荷裯之晏晏兮然潢洋而不可帶既驕美而伐武兮負左右之耿介憎愠愉之修美兮好夫人之慷慨衆踥蹀而日進兮美超逺而逾邁農夫輟耕而容與兮恐田野之蕪穢事綿綿而多私兮竊悼後之危敗世雷同而炫燿兮何毁譽之昧昧今修飾而窺鏡兮後尚可以竄藏願寄言夫流星兮羌儵忽而難當卒壅蔽此浮雲兮暗漠而無光堯舜皆有所舉任兮故髙枕而自適諒無怨於天下兮心焉取此怵惕椉騏驥之瀏瀏兮馭安用夫强䇿諒城廓之不足恃兮雖介介之何益邅翼翼而無終兮忳惽惽而愁約生天地之若過兮功不成而無效願沈滯而無見兮尚欲布名乎天下然潢洋而不遇兮直怐愗而自苦莽洋洋而無極兮忽翺翔之焉薄國有驥而不知椉兮焉皇皇而更索寗戚謳於車下兮桓公聞而知之無伯樂之善相兮今誰使乎訾之㒺流涕以聊慮兮惟著意而得之紛純純之願忠兮妬彼離而鄣之願賜不肖之軀而别離兮放遊志乎雲中椉精氣之摶摶兮鶩諸神之湛湛驂白霓之習習兮厯羣靈之豐豐左朱雀之茇茇兮右蒼龍之躍屬兮雷師之闐闐兮通飛亷之衙衙前輕輬之鏘鏘兮後輜椉之從從載雲旗之委蛇兮扈屯騎之容容計專專之不可化兮願遂推而為臧頼皇天之厚徳兮還及君之無恙右江離大葉芎藭也清芬似芹性能禦濕右芷白芷也或謂之茝禮記所稱茝蘭是也其葉婆娑佩之可以辟惡右秋蘭澤蘭也生水中及下濕地方莖紫節七月始花右蕙零陵香也春秋傳謂之薫莊子薫然慈仁謂之君子亦取此義右蘭都梁香也詩曰秉蕳夏小正曰畜蘭陸璣草木疏云蘭為王者香草其莖葉皆以澤蘭廣而長節節中赤髙四五尺朱子楚詞辨証謂本草所言蘭似澤蘭今處處有之蕙則自為零陵香尤不難識大抵古所謂香草必其花葉皆香而燥濕不變故可刈而為佩若今所謂蘭蕙其花雖香而葉乃無氣其香雖美而質弱易萎非可刈而佩者也又王象晉正譌今世重建蘭北方尤為難致間得一本不啻拱壁及詳閲遯齋閑覽楚辭辨證草木疏諸書乃知今所崇尚皆非靈均九畹故物至有謂春花為蘭秋花為蕙者其視紉秋蘭為佩之語不剌謬乎云云蓋世祗知重花而不知辨葉往往即以建蘭指為離騷之蘭自宋代以來畫家譌誤相沿習而不察朱子乃閩人豈不識其土産而反為之辨析如此亦可以釋人之惑矣右留夷詩所謂勺藥也山海經云洞庭之上多勺藥右掲車䒗輿也生山谷中熏衣辟蛀厥用為多右杜衡爾雅謂之土鹵廣雅謂之楚蘅根類馬蹄又呼為馬蹄者右菊真菊與苦薏異其葉柔其花小神農書以菊為養生上藥右荃昌蒲之無劒脊者廣雅謂之昌陽或謂之堯韭右蘪蕪芎藭苗也生於五沃之土其葉小於江離右杜若葉似薑而有文理亦名良薑即今之髙良薑右薠似莎而大有青白二種白者取其香亦昭其潔也右三秀芝也一嵗三華古稱瑞草右薇爾雅云薇垂水説文薇似霍莖葉氣味與豌豆同右薺味甘師曠所謂嵗欲豐甘草先生者是也
