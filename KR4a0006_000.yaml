body:
  text: 乾隆四十六年十二月十五日奉㫖四庫全書館進呈書内有蕭雲從畫離騷圖一冊葢踵李公麟九歌圖意而分章摘句續為全圖博考前經義存規鑑頗合古人左圖右書之意但今書中所存各圖巳缺畧不全又如蓀荃蘭蕙以喻君子寄意遥深雲從本未為圖自應一併繪入以彰稱物芳著於古今圖書集成内採取補入南書房翰林等逐一考訂將應補者酌定藁本令門應兆倣照李公麟九歌圖筆意補行繪畫以臻完善書仍舊貫新補者各注明録㫖簡端即以當序欽此御製題補繪蕭雲從離騷全圖八韻畫史老田野披憐長巻情四庫全書館進呈蕭雲從所著離騷圖始知其善畫侍郎曹文埴因進所藏雲從山水長巻末自識云河陽李晞古作大障為髙宗所眷愛余草野中人無縁獻納雖衰老極力勉為此巻藏之以俟知我云云詞頗誠懇因為題句不縁四庫輯那識此人名六法道由寓三閭蹟以呈因之為手繪足見用心精嵗久惜佚闕西清命補成共圖得百五雲從踵李公麟九歌為離騷圖頗合古人左圖右書之意但今書只存卜居漁父合繪一圖九歌九圖天問五十四圖其餘或原本未畫或舊有今闕因命南書房翰林等逐一考訂令門應兆補繪九十一圖合之原書六十四圖共一百五十五圖俾臻完善若史表幽貞姓屈性無屈名平鳴不平遷云可以汲披閲凜王明遵㫖補繪蕭雲從離騷全圗凡例一蕭雲從原書目録載有離騷全圖今已逸去應為補繪按離騷一篇屈原一生梗概備載其間非片楮所能殫其義因繹三閭之詞復考諸家之注分文析句釐為三十二圗葢凖原書天問圗分繪之例一原書目録九章無圗葢雲從初輯是編未經繪畫者也按九章為屈原既放江南以後之作時序不同景物亦異所宜分圗布景指事傳神於每章各繪一圗興原書九歌同例一原書凡例所載逺逰五圗闕今詳加恭考仍釐為五圗以合原書之數至卜居漁父二篇原書既有合圗兹不復繪免致繁複一九辯招魂大招三篇原目凡例中既以宋玉景差為屈原授經之士並引王注疑為屈子所作附存於後則亦宜㨿雲從纂輯體例一律補圗今九辯按章為九圖招魂分叚為十三圖大招分段為七圖一楚辭各篇皆借香草以喻君子誠宜殿以芬芳寫其髙潔雲從原書凡例亦稱香草一圖有志未逮今按名别類分為十六圗以附於後至於椒榝為木本芰荷為水花已㪚見於各篇所補圖内他如茅薋菉葹之類凡所指為惡草者概不闌入一原書祇有三閭大夫鄭詹尹漁父合繪之一圖九歌九圖天問五十四圖今自離騷篇起至香草止為補繪九十一圗共成一百五十五圗庶幾圖既補亡篇無剰義云爾蕭雲從離騷圖原序宋郭思畫論始例規鑒謂其與六籍同功四時並運也夫有圖而後有書書義有六而象形指事猶然圖也六經首易展巻未讀其詞先玩其象矣楚三閭大夫作離騷九歌天問九章逺遊卜居漁父而其徒宋景以及淮南長沙朔忌向褒輩皆擬之遂尊為經豈不以騷者經之變也詩無楚而楚有騷文王化行南國漢廣江汜皆楚屬已列十五國之先騷為經而經有圖不啻溯源於河洛矣竊見信州石本六經圗如律吕衡璿禮器小戎豳風每多譌謬僭意紏訂之矣近睹九歌圖不大稱意怪為改竄而天問亦随筆就藁大約徴形爍理使後人翻覆玩繹悽絭以想古人處亂託憂之難而瓌琦卓譎足以驚心動魄知隂陽鬼神之不可測俾明治亂之數芳穢之辨有自來爾如窮文絶艷以視楚騷者則不知騷之為經故也然吾尊騷於經則不得不尊騷而為圖矣况離騷本國風而嚴斷於書九歌九章本雅頌而莊敬於禮竒法於易屬辭比事於春秋司馬史稱其志潔行芳與日月爭光而漢宣帝以為合於經術豈余之臆説耶盖聖人立象以盡意而書不盡言言不盡意一畫之中櫽括遐𣺌乃世亦尊六經於文詞而不研其義不研其義則制器尚象上繡下㑹以目治之者鮮矣馬鄱陽通考載六經譜數百條亦謂騷有香草漁父諸本乃知覃精於經者必稽詳於圖而後已紫陽夫子深惜樂記説理而度數失傳易脱卦象離騷無能手畫者索圖於騷與索圖於經並論又可知矣余不敏抒毫補綴一宗紫陽之注用備後來之勸懲而終歎古人之不見我也乙酉中秋七日題於萬石山之應逺堂欽定四庫全書集部一欽定補繪蕭雲從離騷全圖楚辭類巻上離騷經三十二圖今補九歌傳九圖舊有巻中天問傳五十四圖舊有巻下九章傳九圖今補逺遊傳五圖今補卜居傳漁父傳二篇各為一圖舊有九辯傳九圖今補招魂傳十三圖今補大招傳七圖今補香草圖十六圖今補臣等謹案欽定補繪離騷全圖三巻國朝蕭雲從原圖乾隆四十七年奉勅補繪雲從字尺木當塗貢生考天問序稱屈原放逐彷徨山澤見楚有先王之廟及公卿祠堂圖畫天地山川神靈琦瑋譎佹及古聖賢怪物行亊因書其壁呵而問之是楚辭之興本由圖畫而作後世讀其書者見所徴引自天文地理蟲魚草木與凡可喜可愕之物無不畢備咸足以擴耳目而窮幽渺往往就其興趣所至繪之為圖如宋之李公麟等皆以此擅長特所畫不過一篇一章未能賅極情狀雲從始因其章句廣為此圖當時咸推其工妙為之鐫刻流傳然原本所有祇以三閭大夫鄭詹尹漁父合繪一圖冠於巻端及九歌為九圖天問為五十四圖而目録凡例所稱離騷經逺遊諸圖並已闕佚香草一圖則自稱有志未逮核之楚辭篇什挂漏良多皇上㡬餘披覽以其用意雖勤而脱畧不免特命内廷諸臣參考釐訂各為補繪於離騷經則分文析句次為三十二圖又九章為九圖逺遊為五圖九辨為九圖招魂為十三圖大招為七圖香草為十六圖於是體物摹神粲然大備不獨原始要終篇無剰義而靈均㫖趣亦藉以考見其比興之原仰見大聖人游藝觀文意存深逺而雲從以繪事之微荷蒙宸鑒得為大輅之椎輪實永被榮施於不朽矣乾隆四十九年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
