front:
  text: 欽定四庫全書欽定補繪蕭雲從離騷全圖巻中
  hash: sha256:1341530a900fa22a511044184f95d46eda801e63f46250beea6aed96a8939c72
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4a0006_WYG_002-1a, image: WYG1062/WYG1062-0525a.png}
body:
  text: 天問天問者屈原之所作也何不言問天天尊不可問故曰天問也屈原放逐憂心愁悴彷徨山澤經厯陵陸嗟號旻天仰天歎息見楚有先王之廟及公卿祠堂圖畫天地山川神靈琦瑋僪佹及古賢聖怪物行事周流罷倦休息其下仰見圖畫因書其壁呵而問之以洩憤懣舒寫愁思楚人哀惜屈原因共論述故其文義不次序云爾曰遂古之初誰傳道之上下未形何由考之㝠昭瞢闇誰能極之馮翼維象何以識之明明闇闇惟時何為隂陽三合何本何化圜則九重孰營度之惟兹何功孰初作之斡維焉繁天極焉加八柱何當東南何虧九天之際安放安屬隅隈多有誰知其數天何所㳫十二焉分日月安屬列星安陳出自湯谷次於䝉汜自明及晦所行㡬里夜光何徳死則又育厥利維何而顧免在腹女岐無合夫焉取九子伯强何取惠氣安在何闔而晦何開而明角宿未旦曜靈安蔵不任汩鴻師何以尚之僉曰何憂何不課而行之鴟龜曳銜鯀何聴焉順欲成功帝何刑焉永遏在羽山夫何三伯不施年禹腹鯀夫何以變化纂就前緒遂成考功何續初繼業而厥謀不同洪淵極深何以寘之地方九則何以墳之應龍何畫河海何厯鯀何所營禹何所成康回馮怒何故以東南傾九州安錯川谷何洿東流不溢孰知其故東西南北其修孰多南北順楕其衍㡬何崑崙懸圃其尻安在增城九重其高㡬里四方之門其誰從焉西北闢啓何氣通焉日安不到燭龍何照羲和之未揚若華何光何所冬暖何所夏寒焉有石林何獸能言焉有龍虬負熊以遊雄虺九首儵忽焉在何所不死長人何守靡蓱九衢枲華安居靈蛇呑象厥大如何黒水𤣥趾三危安在延年不死夀何所止鯪魚何所鬿堆焉處羿焉彃日烏焉解羽禹之力獻功降省下土方焉得彼嵞山女而通之於台桑閔妃匹合厥身是繼胡為嗜不同味而快朝飽啓代益作后卒然離蠥何啓惟憂而能拘是達皆歸躬鞫而無害厥躬何后益作革而禹播降啓棘賓啇九辯九歌何勤子屠母而死分竟地帝降夷羿革蠥夏民胡射夫河伯而妻彼雒嬪馮珧利決封豨是射何獻烝肉之膏而後帝不若浞娶純狐眩妻爰謀何羿之射革而交呑揆之阻窮西征巖何越焉化而為黄熊巫何活焉咸播秬黍莆雚是營何由并投而鯀疾修盈白蜺嬰茀胡為此堂安得夫良藥不能固臧天式從横陽離爰死大鳥何鳴夫焉喪厥體蓱號起雨何以興之撰體協脅鹿何膺之鼇戴山抃何以安之釋舟陵行何以遷之惟澆在户何求于嫂何少康逐犬而顛隕厥首女岐縫裳而舘同爰止何顛易厥首而親以逢殆湯謀易旅何以厚之覆舟斟尋何道取之桀伐䝉山何所得焉妺嬉何肆湯何殛焉舜閔在家父何以鰥堯不姚告二女何親厥萌在初何所意焉璜臺十成誰所極焉登立為帝孰道尚之女媧有體孰制匠之舜服厥弟終焉為害何肆犬豕而此身不危敗呉獲迄古南嶽是止孰期去斯得兩男子縁鵠飾玉后帝是饗何承謀夏桀終以滅喪帝乃降觀下逢伊摰何條放致罰而黎服大説簡狄在臺嚳何宜元鳥致詒女何喜該秉季徳厥父是臧胡終弊於有扈牧夫牛羊干協時舞何以懐之平脅曼膚何以肥之有扈牧豎云何而逢擊狀先出其命何從恒秉季徳焉得夫朴牛何往營班禄不但還來昏微循迹有狄不寧何繁鳥萃棘負子肆情眩弟並淫危害厥兄何變化以作詐而後嗣逢長成湯東巡有莘爰極何乞彼小臣而吉妃是得水濱之木得彼小子夫何惡之媵有莘之婦湯出重泉夫何罪尤不勝心伐帝夫誰使挑之會朝爭盟何踐吾期蒼鳥羣飛孰使萃之列擊紂躬叔旦不嘉何親揆𤼵定周之命以咨嗟授殷天下其位安施反成乃亡其罪伊何爭遣伐器何以行之並驅擊翼何以將之昭王成遊南土爰底厥利惟何逢彼白雉穆王巧挴夫何周流環理天下夫何索求妖夫曳衒何號于市周幽誰誅焉得夫褒姒天命反側何罰何佑齊桓九會卒然身殺彼王紂之躬孰使亂惑何惡輔弼讒諂是服比干何逆而抑沈之雷開何順而賜封之何聖人之一徳卒其異方梅伯受醢箕子佯狂稷維元子帝何竺之投之于冰上鳥何燠之何馮弓挟矢殊能將之既驚帝切激何逢長之伯昌號衰秉鞭作牧何令徹彼岐社命有殷國遷蔵就岐何能依殷有惑婦何所譏受賜兹醢西伯上告何親就上帝罰殷之命以不救師望在肆昌何志鼓刀揚聲后何喜武𤼵殺殷何所悒載尸集戰何所急伯林雉經維其何故何感天仰地夫誰畏懼皇天集命維何戒之受禮天下又使至代之初湯臣摰後兹承輔何卒官湯尊食宗緒勲闔夢生少離散亡何壯武厲能流厥嚴彭鏗斟雉帝何饗受夀永多夫何久中央共牧后何怒蠭蟻微命力何固驚女采薇鹿何祐北至回水萃何喜兄有噬犬弟何欲易之以百兩卒無禄薄暮雷電歸何憂厥嚴不奉帝何求伏匿穴處爰何云荆勲作師夫何長悟過改更我又何言呉光爭國久余是勝何環穿自閭社丘陵爰出子文吾告堵敖以不長何試上自予忠名彌彰
